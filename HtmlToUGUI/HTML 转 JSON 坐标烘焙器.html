<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>HTML to JSON UI Baker (Box-Model Fixed)</title>
    <style>
        body { margin: 0; padding: 0; display: flex; height: 100vh; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1e1e1e; color: #d4d4d4; }
        .panel { flex: 1; display: flex; flex-direction: column; border-right: 1px solid #333; }
        .header { padding: 10px 20px; background-color: #2d2d2d; border-bottom: 1px solid #3e3e42; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        button { background-color: #0e639c; color: white; border: none; padding: 6px 12px; cursor: pointer; border-radius: 2px; font-size: 12px; }
        button:hover { background-color: #1177bb; }
        textarea { flex: 1; background-color: #1e1e1e; color: #d4d4d4; border: none; padding: 15px; font-family: Consolas, monospace; font-size: 14px; resize: none; outline: none; }
        #preview-container { flex: 1; background-color: #2d2d2d; display: flex; justify-content: flex-start; align-items: flex-start; overflow: auto; padding: 20px; }

        /* 沙盒容器本身 */
        #canvas-sandbox { background-color: #ffffff; position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.5); overflow: hidden; }

        /* 核心修正：强制沙盒内所有元素使用 border-box 盒模型，并防止 Flex 子节点溢出 */
        #canvas-sandbox * {
            box-sizing: border-box !important;
        }
        #canvas-sandbox [data-u-type] {
            min-width: 0;
            min-height: 0;
        }
    </style>
</head>
<body>

<div class="panel">
    <div class="header">
        <span>1. 粘贴 AI 生成的 HTML</span>
        <button onclick="renderPreview()">渲染预览</button>
    </div>
    <textarea id="code-editor" placeholder="在此粘贴带有 data-u-name 和 data-u-type 的 HTML 代码..."></textarea>
</div>

<div class="panel">
    <div class="header">
        <span>2. 布局预览与 JSON 烘焙 (Max: 1920x1080)</span>
        <button onclick="bakeToJSON()" style="background-color: #28a745;">提取坐标并生成 JSON</button>
    </div>
    <div id="preview-container">
        <div id="canvas-sandbox"></div>
    </div>
    <div class="header" style="border-top: 1px solid #3e3e42; border-bottom: none;">
        <span>3. 导出的 JSON 数据</span>
        <button onclick="copyJSON()" style="background-color: #d97706;">复制 JSON</button>
    </div>
    <textarea id="json-output" readonly style="flex: 0.5; background-color: #252526; color: #ce9178;"></textarea>
</div>

<script>
    function renderPreview() {
        const code = document.getElementById('code-editor').value;
        const sandbox = document.getElementById('canvas-sandbox');
        sandbox.innerHTML = code;

        const rootNode = sandbox.querySelector('[data-u-type]');
        if (rootNode) {
            sandbox.style.width = rootNode.style.width || window.getComputedStyle(rootNode).width;
            sandbox.style.height = rootNode.style.height || window.getComputedStyle(rootNode).height;
        }
    }

    function bakeToJSON() {
        renderPreview();
        const sandbox = document.getElementById('canvas-sandbox');
        const rootElement = sandbox.querySelector('[data-u-name]');

        if (!rootElement) {
            alert("[拦截] 未找到包含 data-u-name 的根节点！");
            return;
        }

        const rootRect = rootElement.getBoundingClientRect();

        if (Math.round(rootRect.width) > 1920 || Math.round(rootRect.height) > 1080) {
            alert(`[拦截] 根节点尺寸超限！当前尺寸: ${Math.round(rootRect.width)}x${Math.round(rootRect.height)}。`);
            return;
        }

        const uiData = traverseAndBake(rootElement, rootRect);
        document.getElementById('json-output').value = JSON.stringify(uiData, null, 2);
    }

    function traverseAndBake(element, rootRect) {
        const uType = element.getAttribute('data-u-type');
        const uName = element.getAttribute('data-u-name');

        let nodeData = null;

        if (uType && uName) {
            const rect = element.getBoundingClientRect();
            const style = window.getComputedStyle(element);

            const relativeX = rect.left - rootRect.left;
            const relativeY = rect.top - rootRect.top;

            let textContent = element.innerText || "";
            if (element.tagName.toLowerCase() === 'input') {
                textContent = element.value || element.placeholder || "";
            }

            let fontSize = 14;
            if (style.fontSize) fontSize = parseFloat(style.fontSize);

            let textAlign = style.textAlign || 'center';

            let uDir = element.getAttribute('data-u-dir') || 'v';
            let uValue = parseFloat(element.getAttribute('data-u-value')) || 0.5;
            let uChecked = element.getAttribute('data-u-checked') === 'true';
            let uOptions = [];

            if (uType === 'dropdown' && element.tagName.toLowerCase() === 'select') {
                const opts = element.querySelectorAll('option');
                opts.forEach(opt => uOptions.push(opt.innerText.trim()));
            }

            nodeData = {
                name: uName,
                type: uType,
                dir: uDir,
                value: uValue,
                isChecked: uChecked,
                options: uOptions,
                x: Math.round(relativeX),
                y: Math.round(relativeY),
                width: Math.round(rect.width),
                height: Math.round(rect.height),
                color: rgb2hex(style.backgroundColor),
                fontColor: rgb2hex(style.color),
                fontSize: Math.round(fontSize),
                textAlign: textAlign,
                text: textContent.trim(),
                children: []
            };
        }

        const childrenData = [];
        for (let i = 0; i < element.children.length; i++) {
            if (element.tagName.toLowerCase() === 'select' && element.children[i].tagName.toLowerCase() === 'option') {
                continue;
            }
            const childResult = traverseAndBake(element.children[i], rootRect);
            if (childResult) childrenData.push(childResult);
        }

        if (nodeData) {
            nodeData.children = childrenData;
            return nodeData;
        } else if (childrenData.length > 0) {
            return childrenData.length === 1 ? childrenData[0] : {
                name: "layoutGroup_" + Math.random().toString(36).substr(2, 5),
                type: "div", dir: "v", value: 0, isChecked: false, options: [],
                x: 0, y: 0, width: 0, height: 0,
                color: "#FFFFFF00", fontColor: "#000000", fontSize: 14, textAlign: "center", text: "", children: childrenData
            };
        }

        return null;
    }

    function rgb2hex(rgb) {
        if (!rgb || rgb === 'rgba(0, 0, 0, 0)' || rgb === 'transparent') return '#FFFFFF00';
        const match = rgb.match(/^rgba?\((\d+),\s*(\d+),\s*(\d+)(?:,\s*([\d.]+))?\)$/);
        if (!match) return '#FFFFFF';
        const r = ("0" + parseInt(match[1], 10).toString(16)).slice(-2);
        const g = ("0" + parseInt(match[2], 10).toString(16)).slice(-2);
        const b = ("0" + parseInt(match[3], 10).toString(16)).slice(-2);
        const a = match[4] ? ("0" + Math.round(parseFloat(match[4]) * 255).toString(16)).slice(-2) : "ff";
        return `#${r}${g}${b}${a === 'ff' ? '' : a}`;
    }

    function copyJSON() {
        const jsonText = document.getElementById('json-output');
        jsonText.select();
        document.execCommand('copy');
        alert("JSON 已复制到剪贴板");
    }
</script>
</body>
</html>
